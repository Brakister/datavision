version: "3.8"

services:
  # ============================================
  # FRONTEND
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - datavision-network

  # ============================================
  # BACKEND
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://datavision:datavision@postgres:5432/datavision
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
      - DUCKDB_PATH=/app/storage/analytics.db
      - DEBUG=true
      - CORS_ORIGINS=["http://localhost:5173"]
    volumes:
      - ./backend/app:/app/app
      - datavision-storage:/app/storage
    depends_on:
      - postgres
      - redis
    networks:
      - datavision-network

  # ============================================
  # WORKER (Celery)
  # ============================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://datavision:datavision@postgres:5432/datavision
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
    volumes:
      - ./backend/app:/app/app
      - datavision-storage:/app/storage
    depends_on:
      - postgres
      - redis
    networks:
      - datavision-network

  # ============================================
  # POSTGRESQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=datavision
      - POSTGRES_PASSWORD=datavision
      - POSTGRES_DB=datavision
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - datavision-network

  # ============================================
  # REDIS
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - datavision-network

volumes:
  postgres-data:
  redis-data:
  datavision-storage:

networks:
  datavision-network:
    driver: bridge
